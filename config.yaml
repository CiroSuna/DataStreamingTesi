# Global algorithm parameters shared across all modes
global:
  alpha: 0.1              # EMA smoothing factor
  p_target: 0.7           # target utilisation per worker thread
  max_threads: 30        # upper bound on worker threads
  min_threads: 30
  pause_time_ms: 500      # minimum ms between consecutive scaling decisions
  percentile_window: 200  # sliding window size for p99/p50 computation (~1 s at 200 items/s)
  warmup_items: 20        # items collected before scaling logic activates
  

# Standard load: inter-arrival rate stays within the pipeline's max capacity.
# WorkerB bottleneck ~400 items/s (20 threads × 1/50ms).
# Rate range: 1000/(base+amp) to 1000/(base-amp) ≈ 143–333 items/s → always sustainable.
standard:
  base_rate_ms: 5.0
  amplitude_ms: 2.0
  period_s: 20.0
  run_duration_s: 100.0
  W_max_A_p99: 0.06     # 3× service time A (20 ms)
  W_max_A_p50: 0.035    # 1.75× service time A
  W_max_B_p99: 0.15     # 3× service time B (50 ms)
  W_max_B_p50: 0.08     # 1.6× service time B

# Overload: sustained rate above the pipeline's maximum throughput.
# Rate range: 1000/2.1 to 1000/1.5 ≈ 476–667 items/s → always exceeds WorkerB capacity.
overload:
  base_rate_ms: 1.8
  amplitude_ms: 0.3
  period_s: 15.0
  run_duration_s: 100.0
  W_max_A_p99: 0.06
  W_max_A_p50: 0.035
  W_max_B_p99: 0.15
  W_max_B_p50: 0.08
